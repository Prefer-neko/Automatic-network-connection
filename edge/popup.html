<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <style>
        body { width: 260px; padding: 15px; font-family: 'Microsoft YaHei', sans-serif; }
        .form-group { margin-bottom: 10px; }
        label { display: block; font-size: 13px; margin-bottom: 5px; }
        input[type="text"], input[type="password"] { width: 100%; padding: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 8px; background-color: #0078D7; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 10px;}
        button:hover { background-color: #005A9E; }
        .toggle-group { display: flex; align-items: center; justify-content: space-between; font-size: 13px; margin-top: 15px;}
        #status { margin-top: 10px; font-size: 12px; color: green; text-align: center; }
    </style>
</head>
<body>
    <h3>校园网自动登录</h3>
    <div class="form-group">
        <label>学号/账号：</label>
        <input type="text" id="username" placeholder="请输入账号">
    </div>
    <div class="form-group">
        <label>密码：</label>
        <input type="password" id="password" placeholder="请输入密码">
    </div>
    <div class="toggle-group">
        <label for="autoLogin">断网自动检测并登录</label>
        <input type="checkbox" id="autoLogin">
    </div>
    <button id="saveBtn">保存设置</button>
    <div id="status"></div>
    <script src="popup.js"></script>
</body>
</html>
